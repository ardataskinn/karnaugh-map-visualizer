<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Karnaugh Map Sadeleştirme (K-map)</title>
    <meta name="description" content="Karnaugh Map (K-map) ile 4 değişkenli mantık fonksiyonu sadeleştirme. Truth table / SOP / POS / string ifade ile giriş, otomatik sadeleştirme." />
    <meta name="keywords" content="karnaugh map,kmap,k-map,logic simplification,bool cebir,sop,pos,truth table,quine mccluskey,boolean" />
    <meta name="robots" content="index,follow" />
    <meta name="google-site-verification" content="E5iYVKqRikFoMiUSKn_ZI0L7duNPdQgUwTGpIfepUuk" />
    <link rel="icon" type="image/png" href="./kmap.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="brandRow">
            <img class="brandLogo" src="./kmap.png" alt="K-map" />
            <div class="title">Karnaugh Map Sadeleştirici</div>
          </div>
          <div class="varNameInputs" id="varNameInputs"></div>
        </div>

        <div class="exprMode">
          <div class="label">Çıktı</div>
          <div class="segmented" role="group" aria-label="Expression mode">
            <button class="segbtn is-active" id="exprModeSOP" type="button">SOP</button>
            <button class="segbtn" id="exprModePOS" type="button">POS</button>
          </div>
        </div>
      </header>

      <main class="center">
        <div class="legend" id="legend"></div>
        <div class="kmapRow">
          <div class="kmapCard">
            <div id="kmapContainer"></div>
          </div>
          <div class="kmapHelp">
            Hücrelere tıklayarak değerleri <b>X → 0 → 1</b> olarak değiştirebilirsiniz.
          </div>
        </div>
      </main>

      <section class="resultCard" aria-live="polite">
        <div class="resultLabel">Fonksiyon</div>
        <div id="expressionBox" class="expression">F = ?</div>
      </section>

      <footer class="bottom">
        <div class="inputModeSegment segmented" role="group" aria-label="Input mode">
          <button class="segbtn is-active" id="inputBtnTruth" type="button">Truth Table</button>
          <button class="segbtn" id="inputBtnSop" type="button">SOP Gir</button>
          <button class="segbtn" id="inputBtnPos" type="button">POS Gir</button>
          <button class="segbtn" id="inputBtnString" type="button">String (İfade)</button>
        </div>

        <div class="panel" id="panelTruth">
          <div class="field">
            <label>Truth table (m=0..15, sırayla A B C D)</label>
            <div class="hint" id="truthOrderHint"></div>
            <div class="truthRow">
              <div id="truthTableWrap" class="truthTableWrap"></div>
            </div>
          </div>
          <div class="actions">
            <button class="btn primary" id="applyTruthBtn" type="button">Hesapla</button>
          </div>
        </div>

        <div class="panel is-hidden" id="panelSop">
          <div class="field">
            <label for="onesInput">F=1 mintermleri</label>
            <input id="onesInput" type="text" placeholder="Örn: 1,3,5" />
          </div>
          <div class="field">
            <label for="dcInputSop">Don't care (X)</label>
            <input id="dcInputSop" type="text" placeholder="Örn: 2,6 (boş olabilir)" />
          </div>
          <div class="actions">
            <button class="btn primary" id="applySopBtn" type="button">Uygula & Hesapla</button>
          </div>
        </div>

        <div class="panel is-hidden" id="panelPos">
          <div class="field">
            <label for="zerosInput">F=0 maxterimleri</label>
            <input id="zerosInput" type="text" placeholder="Örn: 0,2,4" />
          </div>
          <div class="field">
            <label for="dcInputPos">Don't care (X)</label>
            <input id="dcInputPos" type="text" placeholder="Örn: 1,3 (boş olabilir)" />
          </div>
          <div class="actions">
            <button class="btn primary" id="applyPosBtn" type="button">Uygula & Hesapla</button>
          </div>
        </div>

        <div class="panel is-hidden" id="panelString">
          <div class="field">
            <label for="stringInput">İfade (SOP): örn. A'BC + ABC + BC</label>
            <textarea id="stringInput" rows="3" placeholder="A'BC + ABC + BC"></textarea>
          </div>
          <div class="actions">
            <button class="btn primary" id="applyStringBtn" type="button">Uygula & Hesapla</button>
          </div>
        </div>

        <div class="bottomActions">
          <button class="btn" id="resetAllBtn" type="button">Tüm hücreleri X yap</button>
          <button class="btn primary" id="computeBtn" type="button">Hesapla</button>
        </div>

        <div class="siteFooter">
          Made by Arda Taşkın ·
          <a href="https://github.com/ardataskinn" target="_blank" rel="noopener noreferrer">github.com/ardataskinn</a>
        </div>
      </footer>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
